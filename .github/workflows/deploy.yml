name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # FFM (Project Panama) needs JDK 22+; the native render boundary loads
      # a pre-baked library, so no Zig toolchain is required.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: m2-${{ hashFiles('deps.edn') }}

      - name: Build site
        run: clojure -X:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
